# Reverse proxy for the FileMaker CRM MCP server.
# Place at /etc/nginx/sites-available/fm-crm-mcp, symlink into sites-enabled,
# then run `certbot --nginx -d crm-mcp.yourdomain.com` to fill in the SSL
# lines automatically (certbot rewrites this file in place).
#
# NOTE: this deployment actually uses Caddy (see Caddyfile.snippet), not
# nginx — this file is kept only as a reference in case of a future move
# off Caddy.
#
# Streamable HTTP needs long-lived connections held open (it can use
# Server-Sent Events for streaming responses) — the proxy_* directives below
# disable buffering and extend the read timeout so a slow FileMaker query
# doesn't get cut off mid-response.

server {
    listen 80;
    server_name crm-mcp.yourdomain.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name crm-mcp.yourdomain.com;

    # ssl_certificate / ssl_certificate_key filled in by certbot

    location /mcp {
        proxy_pass http://127.0.0.1:8420;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;

        # Streamable HTTP / SSE — no buffering, no timeout on long responses.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection "";
    }
}
